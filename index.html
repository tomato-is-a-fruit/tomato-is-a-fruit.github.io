<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Google Slides style</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;0,900;1,400&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  :root{
    --bg-app:#F1F3F4;
    --bg-toolbar:#FFFFFF;
    --border:#E3E5E8;
    --border-strong:#DADCE0;
    --text-1:#202124;
    --text-2:#5F6368;
    --text-3:#80868B;
    --blue:#1A73E8;
    --blue-dark:#1765CC;
    --blue-tint:#E8F0FE;
    --yellow:#F9AB00;
    --green:#34A853;
    --red:#EA4335;
    --radius-s:4px;
    --radius-m:8px;
    --radius-l:20px;
    --shadow-1:0 1px 2px 0 rgba(60,64,67,.30), 0 1px 3px 1px rgba(60,64,67,.15);
    --shadow-2:0 1px 3px 0 rgba(60,64,67,.30), 0 4px 8px 3px rgba(60,64,67,.15);
    --accent-a:#1A73E8;
    --accent-b:#34A853;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg-app);
    color:var(--text-1);
    font-family:'Roboto',Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  button{font-family:inherit; cursor:pointer;}
  [contenteditable]{outline:none;}
  [contenteditable]:hover{background:rgba(26,115,232,.06); border-radius:3px;}
  [contenteditable]:focus{background:rgba(26,115,232,.10); border-radius:3px; box-shadow:0 0 0 2px rgba(26,115,232,.35);}

  /* ============ APP SHELL ============ */
  .app{ height:100vh; display:flex; flex-direction:column; }

  /* ---- title bar ---- */
  .title-bar{
    display:flex; align-items:center; gap:14px;
    padding:8px 16px 4px 20px;
    background:var(--bg-toolbar);
  }
  .doc-icon{ width:36px; height:36px; flex:none; }
  .title-meta{ display:flex; flex-direction:column; }
  .doc-title-row{ display:flex; align-items:center; gap:8px; }
  .doc-title{
    font-size:18px; font-weight:400; color:var(--text-1);
    padding:2px 6px; border-radius:4px; max-width:420px;
  }
  .badge{
    background:#FBE9E7; color:#B0570D; font-size:11px; font-weight:700;
    padding:3px 8px; border-radius:4px; letter-spacing:.3px;
  }
  .icon-btn{
    width:32px; height:32px; border:none; background:transparent; border-radius:50%;
    display:flex; align-items:center; justify-content:center; color:var(--text-2);
  }
  .icon-btn:hover{ background:#F1F3F4; }
  .title-icons{ display:flex; align-items:center; gap:2px; margin-left:6px; }
  .title-bar-spacer{ flex:1; }
  .title-bar-right{ display:flex; align-items:center; gap:10px; }
  .pill-btn{
    display:flex; align-items:center; gap:6px;
    border:1px solid var(--border-strong); background:#fff; color:var(--text-2);
    padding:7px 14px; border-radius:20px; font-size:14px; font-weight:500;
  }
  .pill-btn:hover{ background:#F8F9FA; }
  .share-btn{
    display:flex; align-items:center; gap:8px;
    background:var(--blue-tint); color:var(--blue-dark);
    border:none; padding:8px 16px 8px 14px; border-radius:20px;
    font-size:14px; font-weight:500;
  }
  .share-btn:hover{ background:#d9e6fc; }
  .avatar{
    width:32px; height:32px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent-a),var(--accent-b));
    color:#fff; display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700;
  }

  /* ---- menu bar ---- */
  .menu-bar{
    display:flex; gap:2px; padding:2px 20px 6px 20px;
    background:var(--bg-toolbar); font-size:14px; color:var(--text-1);
  }
  .menu-item{ padding:5px 8px; border-radius:4px; }
  .menu-item:hover{ background:#F1F3F4; }

  /* ---- toolbar ---- */
  .toolbar{
    display:flex; align-items:center; gap:2px;
    padding:6px 14px; background:var(--bg-toolbar);
    border-bottom:1px solid var(--border); flex-wrap:wrap;
  }
  .tbtn{
    width:32px; height:32px; border:none; background:transparent; border-radius:6px;
    display:flex; align-items:center; justify-content:center; color:var(--text-2);
  }
  .tbtn:hover{ background:#F1F3F4; }
  .tbtn.active{ background:var(--blue-tint); color:var(--blue-dark); }
  .tsep{ width:1px; height:22px; background:var(--border-strong); margin:0 6px; flex:none; }
  .tlabel-btn{
    border:none; background:transparent; color:var(--text-1); font-size:14px;
    padding:6px 10px; border-radius:6px; display:flex; align-items:center; gap:4px;
  }
  .tlabel-btn:hover{ background:#F1F3F4; }
  .zoom-btn{
    border:1px solid var(--border-strong); background:#fff; color:var(--text-1);
    font-size:13px; padding:5px 10px; border-radius:6px; display:flex; align-items:center; gap:6px;
  }
  .toolbar-spacer{ flex:1; }

  /* ---- body: sidebar + stage ---- */
  .body-row{ flex:1; display:flex; min-height:0; }

  .sidebar{
    width:190px; flex:none; background:var(--bg-toolbar);
    border-right:1px solid var(--border); overflow-y:auto;
    padding:14px 0 14px 16px;
  }
  .thumb-wrap{ display:flex; gap:8px; margin-bottom:12px; align-items:flex-start; }
  .thumb-num{ font-size:12px; color:var(--text-3); width:16px; padding-top:4px; text-align:right; flex:none; }
  .thumb{
    width:148px; aspect-ratio:16/9; border-radius:5px; border:2px solid transparent;
    overflow:hidden; position:relative; background:#fff; box-shadow:0 0 0 1px var(--border-strong);
    flex:none;
  }
  .thumb:hover{ box-shadow:0 0 0 1px var(--text-3); }
  .thumb.active{ border-color:var(--blue); box-shadow:0 0 0 1px var(--blue); }
  .thumb-fill{ position:absolute; inset:0; }
  .thumb-bar{ position:absolute; left:8%; right:8%; height:9%; border-radius:2px; background:rgba(255,255,255,.85); }
  .thumb-circle{ position:absolute; width:22%; aspect-ratio:1; border-radius:50%; background:rgba(255,255,255,.9); }

  /* ---- stage ---- */
  .stage-outer{
    flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:26px; gap:14px; position:relative;
  }
  .slide-stage{
    width:min(100%, 128vh);
    aspect-ratio:16/9;
    background:#fff;
    border-radius:2px;
    box-shadow:var(--shadow-2);
    position:relative;
    overflow:hidden;
  }
  .slide{
    position:absolute; inset:0;
    opacity:0; pointer-events:none;
    transition:opacity .3s ease;
  }
  .slide.active{ opacity:1; pointer-events:auto; }

  .stage-controls{ display:flex; align-items:center; gap:16px; color:var(--text-2); font-size:13px; }
  .nav-btn{
    width:34px; height:34px; border-radius:50%; border:1px solid var(--border-strong);
    background:#fff; display:flex; align-items:center; justify-content:center; color:var(--text-1);
  }
  .nav-btn:hover{ background:#F1F3F4; }
  .nav-btn:disabled{ opacity:.35; cursor:default; }
  .nav-count{ min-width:44px; text-align:center; font-variant-numeric:tabular-nums; }

  /* ============ SLIDE CONTENT STYLES ============ */
  .eyebrow{
    font-size:12px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase;
    color:var(--text-3); margin-bottom:6px; display:block;
  }
  .slide-num-mark{
    position:absolute; bottom:22px; right:28px; font-family:'Roboto Mono',monospace;
    font-size:12px; color:var(--text-3); letter-spacing:1px;
  }

  /* --- intro slide --- */
  .intro-slide{
    display:flex; align-items:center; height:100%;
    background:#fff;
  }
  .intro-left{
    width:40%; height:100%; flex:none; position:relative;
    background:linear-gradient(160deg,var(--accent-a) 0%, #1E88E5 45%, var(--accent-b) 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; color:#fff; padding:0 24px;
  }
  .photo-circle{
    width:34%; aspect-ratio:1; border-radius:50%; border:4px solid rgba(255,255,255,.85);
    background:rgba(255,255,255,.15); display:flex; align-items:center; justify-content:center;
    overflow:hidden; position:relative; cursor:pointer; flex:none;
  }
  .photo-circle img{ width:100%; height:100%; object-fit:cover; display:none; }
  .photo-circle .ph-icon{ width:38%; height:38%; opacity:.85; }
  .photo-circle .ph-label{
    position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,.45);
    color:#fff; font-size:10px; text-align:center; padding:4px 0; opacity:0; transition:opacity .15s;
  }
  .photo-circle:hover .ph-label{ opacity:1; }
  .name-pill{
    background:#fff; color:var(--accent-a); font-weight:700; font-size:15px;
    padding:6px 20px; border-radius:20px; min-width:40%; text-align:center;
  }
  .intro-tagline{ font-size:13px; text-align:center; opacity:.92; max-width:82%; line-height:1.5; }

  .intro-right{
    flex:1; height:100%; display:flex; flex-direction:column; justify-content:center;
    padding:0 56px; gap:14px;
  }
  .intro-title{ font-size:44px; font-weight:900; line-height:1.08; color:var(--text-1); }
  .intro-subtitle{ font-size:16px; font-weight:500; color:var(--text-2); letter-spacing:.3px; }
  .intro-desc{ font-size:14px; color:var(--text-2); line-height:1.65; max-width:460px; margin-top:6px; }
  .intro-links{ display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; }
  .link-chip{
    font-size:12.5px; color:var(--blue-dark); background:var(--blue-tint);
    padding:6px 12px; border-radius:16px; font-weight:500;
  }

  /* --- project slide --- */
  .project-slide{ display:flex; height:100%; background:#fff; }
  .proj-media{
    width:44%; flex:none; height:100%; position:relative;
    background:#F8F9FA; border-right:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
    cursor:pointer;
  }
  .proj-media img{ width:100%; height:100%; object-fit:cover; display:none; }
  .proj-media .media-empty{
    display:flex; flex-direction:column; align-items:center; gap:8px; color:var(--text-3);
    text-align:center; padding:20px;
  }
  .proj-media .media-empty svg{ width:34px; height:34px; opacity:.55; }
  .proj-media .media-empty span{ font-size:12px; font-weight:500; }
  .media-tag{
    position:absolute; top:14px; left:14px; background:rgba(255,255,255,.92);
    font-size:10.5px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    color:var(--text-2); padding:4px 9px; border-radius:4px;
  }

  .proj-body{
    flex:1; height:100%; padding:34px 42px; display:flex; flex-direction:column; min-width:0;
  }
  .proj-title{ font-size:30px; font-weight:700; color:var(--text-1); line-height:1.15; margin-bottom:4px; }
  .proj-role{ font-size:13px; color:var(--accent-a); font-weight:500; margin-bottom:16px; }
  .proj-desc{ font-size:14px; line-height:1.75; color:var(--text-2); max-width:520px; }
  .proj-desc-label{ font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-3); margin:20px 0 8px; display:block; }
  .tools-row{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  .tool-chip{
    font-size:12.5px; font-weight:500; color:var(--text-1); background:#F1F3F4;
    border:1px solid var(--border-strong); padding:6px 13px; border-radius:14px;
  }
  .tool-chip:focus{ background:#fff; }
  .add-tool-btn{
    width:26px; height:26px; border-radius:50%; border:1px dashed var(--border-strong);
    background:transparent; color:var(--text-3); display:flex; align-items:center; justify-content:center;
  }
  .add-tool-btn:hover{ background:#F1F3F4; color:var(--text-2); }

  /* --- 3D viewer slide (project 1) --- */
  .viewer-wrap{ width:100%; height:100%; position:relative; background:#14181d; }
  .viewer-wrap canvas{ display:block; width:100%; height:100%; }
  .viewer-empty{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; color:#8f9aa8; text-align:center; padding:24px; pointer-events:none;
  }
  .viewer-empty svg{ width:40px; height:40px; opacity:.7; }
  .viewer-empty b{ color:#dfe4ea; font-size:13.5px; font-weight:500; }
  .viewer-empty span{ font-size:11.5px; max-width:220px; line-height:1.5; }
  .viewer-controls{
    position:absolute; top:14px; left:14px; right:14px; display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none;
  }
  .viewer-controls > *{ pointer-events:auto; }
  .glb-upload-btn{
    display:flex; align-items:center; gap:7px; background:rgba(255,255,255,.95); color:#202124;
    border:none; padding:8px 14px; border-radius:16px; font-size:12.5px; font-weight:600; box-shadow:var(--shadow-1);
  }
  .glb-upload-btn:hover{ background:#fff; }
  .glb-upload-btn svg{ width:14px; height:14px; }
  .viewer-filename{
    background:rgba(255,255,255,.92); color:var(--text-2); font-size:11px; font-weight:500;
    padding:6px 11px; border-radius:12px; max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .viewer-hint{
    position:absolute; bottom:14px; left:14px; background:rgba(0,0,0,.35); color:#fff;
    font-size:10.5px; padding:5px 10px; border-radius:10px; letter-spacing:.2px;
  }
  .viewer-dragover{ outline:2px dashed #90caf9; outline-offset:-8px; }

  /* ============ PRESENT MODE ============ */
  .app.presenting .title-bar,
  .app.presenting .menu-bar,
  .app.presenting .toolbar,
  .app.presenting .sidebar,
  .app.presenting .stage-controls{ display:none !important; }
  .app.presenting .body-row{ background:#000; }
  .app.presenting .stage-outer{ padding:0; }
  .app.presenting .slide-stage{ width:100vw; height:100vh; max-height:100vh; border-radius:0; box-shadow:none; }
  .exit-present{
    position:fixed; top:18px; right:22px; z-index:50; display:none;
    background:rgba(0,0,0,.55); color:#fff; border:none; padding:9px 16px; border-radius:20px;
    font-size:13px; align-items:center; gap:8px;
  }
  .app.presenting .exit-present{ display:flex; }
  .exit-present:hover{ background:rgba(0,0,0,.75); }

  ::-webkit-scrollbar{ width:10px; }
  ::-webkit-scrollbar-thumb{ background:#D2D5D9; border-radius:6px; }
  ::-webkit-scrollbar-track{ background:transparent; }

  @media (max-width:900px){
    .sidebar{ display:none; }
    .intro-slide{ flex-direction:column; }
    .intro-left{ width:100%; height:46%; }
    .project-slide{ flex-direction:column; }
    .proj-media{ width:100%; height:42%; border-right:none; border-bottom:1px solid var(--border); }
  }
</style>
</head>
<body>
<div class="app" id="app">

  <button class="exit-present" id="exitPresent">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
    Exit presentation (Esc)
  </button>

  <!-- TITLE BAR -->
  <div class="title-bar">
    <svg class="doc-icon" viewBox="0 0 48 48" fill="none">
      <rect x="6" y="4" width="36" height="40" rx="4" fill="#F9AB00"/>
      <rect x="12" y="15" width="24" height="4" rx="1" fill="#fff"/>
      <rect x="12" y="23" width="24" height="4" rx="1" fill="#fff"/>
      <rect x="12" y="31" width="14" height="4" rx="1" fill="#fff"/>
    </svg>
    <div class="title-meta">
      <div class="doc-title-row">
        <span class="doc-title" contenteditable="true" spellcheck="false">My Portfolio</span>
        <span class="badge">.PPTX</span>
        <button class="icon-btn" title="Star">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
        </button>
      </div>
    </div>
    <div class="title-bar-spacer"></div>
    <div class="title-bar-right">
      <button class="pill-btn" id="slideshowBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Slideshow
      </button>
      <button class="share-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="9" width="18" height="12" rx="2"/><path d="M7 9V6a5 5 0 0110 0v3"/></svg>
        Share
      </button>
      <div class="avatar">Y</div>
    </div>
  </div>

  <!-- MENU BAR -->
  <div class="menu-bar">
    <span class="menu-item">File</span>
    <span class="menu-item">Edit</span>
    <span class="menu-item">View</span>
    <span class="menu-item">Insert</span>
    <span class="menu-item">Format</span>
    <span class="menu-item">Slide</span>
    <span class="menu-item">Arrange</span>
    <span class="menu-item">Tools</span>
    <span class="menu-item">Help</span>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="tbtn" title="Search"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></button>
    <button class="tbtn" title="New"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
    <div class="tsep"></div>
    <button class="tbtn" title="Undo"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h10a5 5 0 010 10H9"/><path d="M8 5L3 10l5 5"/></svg></button>
    <button class="tbtn" title="Redo"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10H11a5 5 0 000 10h4"/><path d="M16 5l5 5-5 5"/></svg></button>
    <button class="tbtn" title="Print"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V3h12v6M6 18H4a1 1 0 01-1-1v-6a1 1 0 011-1h16a1 1 0 011 1v6a1 1 0 01-1 1h-2M6 14h12v7H6z"/></svg></button>
    <button class="tbtn" title="Paint format"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3h9v5H9zM9 8v4l-5 8h9l-1-8"/></svg></button>
    <button class="zoom-btn" title="Zoom">Fit
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <div class="tsep"></div>
    <button class="tbtn active" title="Select"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4l7.5 17 2.3-7.2L21 11.5z"/></svg></button>
    <button class="tbtn" title="Insert image"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="M21 16l-5-5-6 6"/></svg></button>
    <button class="tbtn" title="Shape"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/></svg></button>
    <button class="tbtn" title="Line"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 19L19 5"/></svg></button>
    <button class="tbtn" title="Text box"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="1"/><path d="M9 9h6M12 9v6"/></svg></button>
    <div class="toolbar-spacer"></div>
    <button class="tlabel-btn">Background</button>
    <button class="tlabel-btn">Layout</button>
    <button class="tlabel-btn">Theme</button>
    <button class="tlabel-btn">Transition</button>
  </div>

  <!-- BODY -->
  <div class="body-row">
    <div class="sidebar" id="sidebar"></div>

    <div class="stage-outer">
      <div class="slide-stage" id="stage"></div>
      <div class="stage-controls">
        <button class="nav-btn" id="prevBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span class="nav-count" id="navCount">1 / 6</span>
        <button class="nav-btn" id="nextBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   SLIDE DEFINITIONS (used to build thumbnails + nav)
   ============================================================ */

/* ============================================================

const slideEls = [...document.querySelectorAll('.slide')];
const thumbEls = [...document.querySelectorAll('.thumb')];
const navCount = document.getElementById('navCount');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function goTo(i){
  current = Math.max(0, Math.min(SLIDES.length - 1, i));
  slideEls.forEach(el => el.classList.toggle('active', +el.dataset.index === current));
  thumbEls.forEach(el => el.classList.toggle('active', +el.dataset.index === current));
  navCount.textContent = `${current+1} / ${SLIDES.length}`;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === SLIDES.length - 1;
  thumbEls[current]?.scrollIntoView({ block:'nearest' });
}
thumbEls[0].classList.add('active');
prevBtn.addEventListener('click', () => goTo(current - 1));
nextBtn.addEventListener('click', () => goTo(current + 1));

document.addEventListener('keydown', (e) => {
  if (document.activeElement && document.activeElement.isContentEditable) return;
  if (e.key === 'ArrowRight' || e.key === 'PageDown') goTo(current + 1);
  if (e.key === 'ArrowLeft' || e.key === 'PageUp') goTo(current - 1);
  if (e.key === 'Escape') exitPresentMode();
});

/* ============================================================
   PRESENT MODE
   ============================================================ */
const appEl = document.getElementById('app');
document.getElementById('slideshowBtn').addEventListener('click', enterPresentMode);
document.getElementById('exitPresent').addEventListener('click', exitPresentMode);

function enterPresentMode(){
  appEl.classList.add('presenting');
  document.documentElement.requestFullscreen?.().catch(()=>{});
}
function exitPresentMode(){
  if (!appEl.classList.contains('presenting')) return;
  appEl.classList.remove('presenting');
  if (document.fullscreenElement) document.exitFullscreen?.();
}
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) appEl.classList.remove('presenting');
});

  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = container.querySelector('img');
    img.src = e.target.result;

    container.querySelectorAll('.media-empty, .ph-icon, .ph-label').forEach(n => n.style.display = 'none');

  reader.readAsDataURL(file);
}

}

<!-- ============================================================
     THREE.JS GLB VIEWER (Project 1 slide)
     ============================================================ -->
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const wrap = document.getElementById('viewerWrap');
const emptyState = document.getElementById('viewerEmpty');
const fileInput = document.getElementById('glbInput');
const filenameLabel = document.getElementById('viewerFilename');

let renderer, scene, camera, controls, currentModel;
let initialized = false;

function initViewer(){
  if (initialized) return;
  initialized = true;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x14181d);

  camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight || 1, 0.01, 2000);
  camera.position.set(2.5, 1.8, 2.5);

  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  wrap.insertBefore(renderer.domElement, wrap.firstChild);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;

  const hemi = new THREE.HemisphereLight(0xffffff, 0x2a2f36, 1.1);
  scene.add(hemi);
  const dir = new THREE.DirectionalLight(0xffffff, 2.2);
  dir.position.set(4, 6, 4);
  scene.add(dir);
  const dir2 = new THREE.DirectionalLight(0x88aaff, 0.6);
  dir2.position.set(-4, -2, -3);
  scene.add(dir2);

  const grid = new THREE.GridHelper(6, 24, 0x2c333c, 0x2c333c);
  grid.position.y = -0.001;
  scene.add(grid);

  renderer.setAnimationLoop(() => {
    controls.update();
    renderer.render(scene, camera);
  });

  window.addEventListener('resize', onResize);
  new ResizeObserver(onResize).observe(wrap);
}

function onResize(){
  if (!renderer) return;
  const w = wrap.clientWidth || 1, h = wrap.clientHeight || 1;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

function frameModel(object){
  const box = new THREE.Box3().setFromObject(object);
  const size = new THREE.Vector3();
  const center = new THREE.Vector3();
  box.getSize(size);
  box.getCenter(center);
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const scale = 1.6 / maxDim;
  object.scale.setScalar(scale);

  box.setFromObject(object);
  box.getCenter(center);
  object.position.sub(center);

  const dist = 3.2;
  camera.position.set(dist * 0.6, dist * 0.45, dist * 0.6);
  camera.near = 0.01;
  camera.far = dist * 50;
  camera.updateProjectionMatrix();
  controls.target.set(0, 0.15, 0);
  controls.update();
}

function loadGLBArrayBuffer(arrayBuffer, name){
  initViewer();
  const loader = new GLTFLoader();
  loader.parse(arrayBuffer, '', (gltf) => {
    if (currentModel) scene.remove(currentModel);
    currentModel = gltf.scene;
    currentModel.traverse(n => { if (n.isMesh) { n.castShadow = false; n.receiveShadow = false; } });
    scene.add(currentModel);
    frameModel(currentModel);
    emptyState.style.display = 'none';
    filenameLabel.style.display = 'block';
    filenameLabel.textContent = name;
  }, (err) => {
    console.error('GLB load error', err);
    emptyState.querySelector('b').textContent = 'Could not load model';
    emptyState.querySelector('span').textContent = 'Make sure the file is a valid .glb or .gltf and try again.';
    emptyState.style.display = 'flex';
  });
}

function handleFile(file){
  if (!file) return;
  const name = file.name || 'model.glb';
  const reader = new FileReader();
  reader.onload = (e) => loadGLBArrayBuffer(e.target.result, name);
  reader.readAsArrayBuffer(file);
}

fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

wrap.addEventListener('dragover', (e) => { e.preventDefault(); wrap.classList.add('viewer-dragover'); });
wrap.addEventListener('dragleave', () => wrap.classList.remove('viewer-dragover'));
wrap.addEventListener('drop', (e) => {
  e.preventDefault();
  wrap.classList.remove('viewer-dragover');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

// Initialize renderer immediately (slide container keeps real dimensions even when not the active slide)
initViewer();
</script>
